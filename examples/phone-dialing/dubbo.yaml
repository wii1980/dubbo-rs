# dubbo-rs configuration for phone-dialing example
# This file demonstrates YAML-based configuration loading via dubbo-config.

application: "phone-dialing"
version: "1.0.0"

protocols:
  - name: "tri"
    host: "0.0.0.0"
    port: 50051

registries:
  - protocol: "nacos"
    address: "127.0.0.1:8848"
